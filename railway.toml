# ============================================================
# Railway Deployment — Neural Hub AI Medical Coding Agent
# ============================================================
# This project deploys as two separate Railway services:
#   1. backend  — FastAPI (Python 3.11)
#   2. frontend — Next.js 16
#
# Each service is configured independently in the Railway dashboard
# using the settings documented below.
# ============================================================

[build]
builder = "DOCKERFILE"

# NOTE: Configure each service in Railway dashboard:
#
# ── BACKEND SERVICE ─────────────────────────────────────────
#   Root Directory:   /backend
#   Build Command:    (handled by Dockerfile)
#   Start Command:    (handled by Dockerfile CMD)
#
#   Required Environment Variables:
#     LLM_PROVIDER=openai
#     LLM_MODEL=gpt-4o
#     OPENAI_API_KEY=sk-proj-...
#     SECRET_KEY=<run: python -c "import secrets; print(secrets.token_hex(32))">
#     EMBEDDING_MODEL=all-MiniLM-L6-v2
#     CORS_ALLOW_ALL_ORIGINS=true
#     DEBUG=false
#
# ── FRONTEND SERVICE ─────────────────────────────────────────
#   Root Directory:   /frontend
#   Build Command:    npm install && npm run build
#   Start Command:    npm start
#
#   Required Environment Variables:
#     NEXT_PUBLIC_API_URL=https://<your-backend-service>.railway.app
