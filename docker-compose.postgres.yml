version: '3.9'

# Extend base docker-compose.yml with PostgreSQL
# Usage: docker-compose -f docker-compose.yml -f docker-compose.postgres.yml up

services:
  api:
    environment:
      - DATABASE_URL=postgresql+asyncpg://medcoder:${POSTGRES_PASSWORD:-medcoder_dev}@postgres:5432/medical_coder
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: medcoder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medical_coder
      POSTGRES_USER: medcoder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medcoder_dev}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medcoder -d medical_coder"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
